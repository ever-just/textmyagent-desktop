<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F8EF7"/>
      <stop offset="50%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1A3FC7"/>
    </linearGradient>
    <linearGradient id="bubble" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF"/>
      <stop offset="100%" style="stop-color:#F0F1F3"/>
    </linearGradient>
    <linearGradient id="dot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB"/>
      <stop offset="100%" style="stop-color:#1D4ED8"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.15"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background: macOS-style continuous rounded rectangle -->
  <rect x="32" y="32" width="960" height="960" rx="220" ry="220" fill="url(#bg)"/>

  <!-- Subtle inner highlight -->
  <rect x="32" y="32" width="960" height="480" rx="220" ry="220" fill="#fff" opacity="0.06"/>

  <!-- Message bubble with shadow -->
  <path d="M256 310
           C256 270 284 242 324 242
           L700 242
           C740 242 768 270 768 310
           L768 550
           C768 590 740 618 700 618
           L440 618
           L340 718
           L340 618
           L324 618
           C284 618 256 590 256 550
           Z"
        fill="url(#bubble)" filter="url(#shadow)"/>

  <!-- Typing indicator dots -->
  <circle cx="396" cy="435" r="30" fill="url(#dot)" opacity="0.9"/>
  <circle cx="512" cy="435" r="30" fill="url(#dot)" opacity="0.7"/>
  <circle cx="628" cy="435" r="30" fill="url(#dot)" opacity="0.5"/>

  <!-- AI sparkle -->
  <path d="M735 165 L748 198 L781 211 L748 224 L735 257 L722 224 L689 211 L722 198 Z" fill="#FBBF24" filter="url(#glow)"/>
  <path d="M790 260 L797 278 L815 285 L797 292 L790 310 L783 292 L765 285 L783 278 Z" fill="#FCD34D" opacity="0.7"/>
</svg>
