name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Run tests
        run: npm test

  build-mac-arm64:
    needs: test
    runs-on: macos-14  # Apple Silicon runner
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npx electron-rebuild -o better-sqlite3

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build custom llama.cpp for Gemma 4
        run: |
          # Clone llama.cpp directly into the path node-llama-cpp expects
          LLAMA_DIR="node_modules/node-llama-cpp/llama/llama.cpp"
          rm -rf "$LLAMA_DIR"
          mkdir -p "$(dirname "$LLAMA_DIR")"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git "$LLAMA_DIR"
          # Create the info file node-llama-cpp checks (isLlamaCppRepoCloned)
          echo '{"tag": "latest"}' > "node_modules/node-llama-cpp/llama/llama.cpp.info.json"
          npx --no node-llama-cpp source build --gpu metal

      - name: Build app
        run: npm run build

      - name: Package arm64
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npx electron-builder --mac dmg zip --arm64 --publish never

      - name: Upload arm64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64
          path: |
            build/*.dmg
            build/*.zip
          if-no-files-found: error

  build-mac-x64:
    needs: test
    runs-on: macos-14  # ARM64 runner — builds x64 via Rosetta 2
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          architecture: x64  # installs x64 Node.js (runs under Rosetta)
          cache: npm

      - name: Install dependencies
        run: |
          npm ci --ignore-scripts
          npx electron-rebuild -o better-sqlite3

      - name: Install dashboard dependencies
        run: cd dashboard && npm ci

      - name: Build custom llama.cpp for Gemma 4
        run: |
          LLAMA_DIR="node_modules/node-llama-cpp/llama/llama.cpp"
          rm -rf "$LLAMA_DIR"
          mkdir -p "$(dirname "$LLAMA_DIR")"
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git "$LLAMA_DIR"
          echo '{"tag": "latest"}' > "node_modules/node-llama-cpp/llama/llama.cpp.info.json"
          npx --no node-llama-cpp source build --gpu metal

      - name: Build app
        run: npm run build

      - name: Package x64
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: npx electron-builder --mac dmg zip --x64 --publish never

      - name: Upload x64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-x64
          path: |
            build/*.dmg
            build/*.zip
          if-no-files-found: error

  publish:
    needs: [build-mac-arm64, build-mac-x64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-arm64
          path: artifacts/arm64

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-x64
          path: artifacts/x64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/arm64/*
            artifacts/x64/*
          generate_release_notes: true
          draft: false
          prerelease: false
