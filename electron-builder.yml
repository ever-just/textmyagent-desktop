appId: com.textmyagent.desktop
productName: TextMyAgent
copyright: Copyright © 2026 Weldon Makori

directories:
  output: build
  buildResources: resources

files:
  - dist/electron/**/*
  - dashboard/out/**/*
  - "!**/*.ts"
  - "!**/*.map"
  - "!**/node_modules/*/{test,__tests__,tests,*.md}"

asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"
  - "**/node-mac-contacts/**"
  - "**/node-llama-cpp/**"
  - "**/*.metal"
  - "**/*.so"
  - "**/*.dylib"

afterSign: notarize.js

mac:
  category: public.app-category.productivity
  icon: resources/icons/icon.icns
  darkModeSupport: true
  hardenedRuntime: true
  gatekeeperAssess: false
  identity: "EVERJUST COMPANY (8769U6225R)"
  type: distribution
  entitlements: resources/entitlements.mac.plist
  entitlementsInherit: resources/entitlements.inherit.plist
  notarize: false
  # Notarization is handled by afterSign hook (notarize.js)
  # Set APPLE_ID, APPLE_ID_PASSWORD, and APPLE_TEAM_ID env vars to enable
  extendInfo:
    # Contacts permission - for identifying message senders
    NSContactsUsageDescription: "TextMyAgent needs access to your contacts to identify message senders and display their names."
    # Automation/AppleEvents permission - for sending messages via Messages app
    NSAppleEventsUsageDescription: "TextMyAgent needs automation access to send messages through the Messages app."
    # Full Disk Access guidance - shown in permission dialogs
    NSSystemAdministrationUsageDescription: "TextMyAgent needs Full Disk Access to read your iMessage history and respond to messages."
    # Additional descriptions for completeness
    NSDesktopFolderUsageDescription: "TextMyAgent may need access to Desktop for file attachments."
    NSDocumentsFolderUsageDescription: "TextMyAgent may need access to Documents for file attachments."
    NSDownloadsFolderUsageDescription: "TextMyAgent may need access to Downloads for file attachments."
  target:
    - target: dmg
      arch:
        - x64
        - arm64
    - target: zip
      arch:
        - x64
        - arm64

dmg:
  backgroundColor: "#ffffff"
  iconSize: 100
  window:
    width: 540
    height: 380
  contents:
    - x: 130
      y: 186
      type: file
    - x: 410
      y: 186
      type: link
      path: /Applications

publish:
  provider: github
  owner: ever-just
  repo: textmyagent-desktop
